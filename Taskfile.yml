version: "3"

tasks:
  # Backend / API tasks
  server:run:
    desc: Run the Go API server locally
    dir: backend
    cmds:
      - go run ./cmd

  server:build:
    desc: Build the Go API server binary
    dir: backend
    cmds:
      - go build -o bin/api ./cmd

  server:test:
    desc: Run backend Go tests
    dir: backend
    cmds:
      - go test ./...

  # Frontend / web tasks
  frontend:install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - npm install

  frontend:start:
    desc: Start frontend development server
    dir: web
    cmds:
      - npm run dev

  frontend:build:
    desc: Build frontend for production
    dir: web
    cmds:
      - npm run build

  k8s:validate-overlays:
    desc: Run kubectl kustomize on dev/staging/prod overlays; fail on build error or invalid Deployment destination
    cmds:
      - |
        set -e
        for o in dev staging prod; do
          echo "== infrastructure/k8s/overlays/${o} =="
          out="$(kubectl kustomize "infrastructure/k8s/overlays/${o}")"
          echo "${out}" | grep -q '^  destination:' && { echo "FAIL: rendered YAML contains '  destination:' (invalid on Deployment)"; exit 1; } || true
          echo "kustomize: OK (no top-level '  destination:' lines)"
        done
        echo "All overlays validated."
