apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stack-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/1ik/cloud-native-app-demo-workflow
    targetRevision: HEAD
    path: infrastructure/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
