apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: backend
          imagePullPolicy: Never # kind / local
          env:
            - name: GIN_MODE
              value: "debug"
            - name: GMAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gmail-credentials
                  key: GMAIL_USERNAME
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gmail-credentials
                  key: GMAIL_APP_PASSWORD
